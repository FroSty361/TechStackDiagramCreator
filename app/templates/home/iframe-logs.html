<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logs</title>
</head>
<body>
    <ul>
    {% for log in logs %}
        {% if time %}
            <li>{{time}} : {{log}}</li>
        {% else %}
            <li>{{log}}</li>
        {% endif %}
    {% endfor %}
    </ul>
</body>
</html>
