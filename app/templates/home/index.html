{% extends "base.html" %}

{% block title %} Welcome! {% endblock %}

{% block content %}

<form action="/result/" method="post">

    <label for="githubInputsContainer">GitHub Connection</label>
    <div id="githubInputsContainer">
        <label for="repoOwner">GitHub Repository Owner</label>
        <input type="text" id="repoOwner" name="repoOwner" pattern="^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$" required />

        <label for="repoName">GitHub Repository Name</label>
        <input type="text" id="repoName" name="repoName" pattern="^[a-zA-Z0-9._-]{1,100}$" required />
    </div>

    <label for="projectSearchingSettingsContainer">Project Searching Settings</label>
    <div id="projectSearchingSettingsContainer">
        <label for="getLanguages">Get Languages</label>
        <input type="radio" id="getLanguages" name="getLanguages" value="true" />

        <label for="getRequirements">Get Requirements</label>
        <input type="radio" id="getRequirements" name="getRequirements" value="true" />
    </div>

    <div id="diagramLayoutSettingsContainer">
        <label for="diagramLayout">Layout</label>
        <select id="diagramLayout" name="diagramLayout" required>
            {% for layout in layouts %}
                <option value="{{ layout.name }}">{{ layout.name }}</option>
            {% endfor %}
        </select>
    </div>

    <input type="submit" name="Submit">
</form>

{% endblock %}
